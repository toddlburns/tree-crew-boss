<script>
'use strict';
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 1024, H = 768;
let scale = 1;

function resize() {
    scale = Math.min(window.innerWidth / W, window.innerHeight / H);
    canvas.width = W * scale;
    canvas.height = H * scale;
    canvas.style.width = canvas.width + 'px';
    canvas.style.height = canvas.height + 'px';
}
window.addEventListener('resize', resize);
resize();

function toGame(tx, ty) {
    const r = canvas.getBoundingClientRect();
    return { x: (tx - r.left) / scale, y: (ty - r.top) / scale };
}

// ─── AUDIO ────────────────────────────────────────────────────
let audioCtx = null;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playSound(type) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const g = audioCtx.createGain(); g.connect(audioCtx.destination);
    if (type === 'chop') {
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
        const s = audioCtx.createBufferSource(); s.buffer = buf; s.connect(g);
        g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.08); s.start(now);
    } else if (type === 'coin') {
        const o = audioCtx.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(880, now); o.frequency.exponentialRampToValueAtTime(1760, now + 0.1);
        o.connect(g); g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        o.start(now); o.stop(now + 0.15);
    } else if (type === 'honk') {
        const o = audioCtx.createOscillator(); o.type = 'square'; o.frequency.value = 220; o.connect(g);
        g.gain.setValueAtTime(0.15, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        o.start(now); o.stop(now + 0.2);
    } else if (type === 'success') {
        [523, 659, 784].forEach((f, i) => {
            const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
            const gg = audioCtx.createGain(); gg.connect(audioCtx.destination);
            gg.gain.setValueAtTime(0.2, now + i * 0.12); gg.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.15);
            o.connect(gg); o.start(now + i * 0.12); o.stop(now + i * 0.12 + 0.15);
        });
    } else if (type === 'fail') {
        [400, 300].forEach((f, i) => {
            const o = audioCtx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = f;
            const gg = audioCtx.createGain(); gg.connect(audioCtx.destination);
            gg.gain.setValueAtTime(0.12, now + i * 0.2); gg.gain.exponentialRampToValueAtTime(0.001, now + i * 0.2 + 0.25);
            o.connect(gg); o.start(now + i * 0.2); o.stop(now + i * 0.2 + 0.25);
        });
    } else if (type === 'tap') {
        const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = 600; o.connect(g);
        g.gain.setValueAtTime(0.15, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
        o.start(now); o.stop(now + 0.06);
    } else if (type === 'timber') {
        const o = audioCtx.createOscillator(); o.type = 'sawtooth';
        o.frequency.setValueAtTime(150, now); o.frequency.exponentialRampToValueAtTime(40, now + 0.6); o.connect(g);
        g.gain.setValueAtTime(0.25, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        o.start(now); o.stop(now + 0.6);
    } else if (type === 'chipper') {
        const o = audioCtx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = 120; o.connect(g);
        g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        o.start(now); o.stop(now + 0.3);
    } else if (type === 'start') {
        [440, 554, 659, 880].forEach((f, i) => {
            const o = audioCtx.createOscillator(); o.type = 'square'; o.frequency.value = f;
            const gg = audioCtx.createGain(); gg.connect(audioCtx.destination);
            gg.gain.setValueAtTime(0.1, now + i * 0.1); gg.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.12);
            o.connect(gg); o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.12);
        });
    } else if (type === 'assign') {
        const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = 700; o.connect(g);
        g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        o.start(now); o.stop(now + 0.1);
        const o2 = audioCtx.createOscillator(); o2.type = 'sine'; o2.frequency.value = 900;
        const g2 = audioCtx.createGain(); g2.connect(audioCtx.destination);
        g2.gain.setValueAtTime(0.2, now + 0.08); g2.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
        o2.connect(g2); o2.start(now + 0.08); o2.stop(now + 0.18);
    }
}

// ─── PERSISTENCE ──────────────────────────────────────────────
let coins = parseInt(localStorage.getItem('tcb_coins') || '0');
let crewLevel = parseInt(localStorage.getItem('tcb_level') || '1');

function save() {
    localStorage.setItem('tcb_coins', coins);
    localStorage.setItem('tcb_level', crewLevel);

}

const CREW = [

    { name: 'The Widow Maker',  type: 'dead', tw: 45, th: 130, cr: 40,  col: '#795548', tc: '#4E342E' },

const JOBS = [
    { d: 1, tasks: ['cones', 'chop'] },
    { d: 1, tasks: ['drive', 'chop'] },
    { d: 1, tasks: ['drive', 'chop', 'chip'] },

// ─── STATE ────────────────────────────────────────────────────
let state = 'MENU';
let job = null;        // current job
let planStep = 0;      // which task we're assigning in PLANNING
let assignments = [];  // worker index per task
let pickConfirm = -1;  // worker index being confirmed, -1 = none
let pickTimer = 0;     // frames remaining in pick confirmation
const PICK_DURATION = 70; // ~1.2 seconds of confirmation display
let phaseResults = [];
let runIdx = 0, runState = 'enter', runFrame = 0, runSuccess = false;
let runTimer = 0, runWorkerX = -50, runVehicleX = -80, runTreeFall = 0, runShave = 0;
let runBucketY = 0, runCones = [];
let earnCoins = 0, earnStars = 0;
let particles = [], floats = [], taps = [];
let speech = null, speechLife = 0;
let shake = 0;
let t = 0;

// ─── MINI-GAME STATE ─────────────────────────────────────────
let mgTargets = [];    // active targets/objects for current mini-game
let mgScore = 0;       // hits so far
let mgNeeded = 0;      // hits needed to pass
let mgTotal = 0;       // total possible
let mgTimer = 0;       // frames remaining in mini-game
let mgTaskId = '';     // current mini-game task type
let mgDiff = 1.0;      // difficulty multiplier (lower = easier)
let mgLane = 1;        // player lane for drive mini-game (0,1,2)
let mgSpawnTimer = 0;  // spawn interval counter
let mgMisses = 0;      // miss counter for drive
let mgInstrText = '';  // instruction text
const MG_DURATION = 300; // 5 seconds at 60fps

// Mini-game instruction text per task
const MG_INSTRUCTIONS = {
    chop: 'TAP the target to chop! 🪓',
    drive: 'TAP top/bottom to dodge! 🚛',
    shave: 'TAP branches to shave! 🪒',

};

// ─── HELPERS ──────────────────────────────────────────────────
function rand(a, b) { return Math.random() * (b - a) + a; }
function pick(a) { return a[Math.floor(Math.random() * a.length)]; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function hit(px, py, x, y, w, h) { return px >= x && px <= x + w && py >= y && py <= y + h; }
function lighten(hex) {
    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    return `rgb(${Math.min(255, r + 40)},${Math.min(255, g + 40)},${Math.min(255, b + 40)})`;
}

// ─── DRAWING ──────────────────────────────────────────────────
function rect(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(~~x, ~~y, ~~w, ~~h); }
function text(s, x, y, sz, c, al, stroke) {
    ctx.font = `bold ${sz}px sans-serif`;
    ctx.textAlign = al || 'center';
    ctx.textBaseline = 'middle';
    if (stroke) { ctx.strokeStyle = '#000'; ctx.lineWidth = sz > 24 ? 5 : 3; ctx.lineJoin = 'round'; ctx.strokeText(s, x, y); }
    ctx.fillStyle = c || '#fff';
    ctx.fillText(s, x, y);
}
function btn(x, y, w, h, label, color, pulse) {
    const sc = pulse ? 1 + Math.sin(t * 6) * 0.03 : 1;
    ctx.save();
    ctx.translate(x + w / 2, y + h / 2);
    ctx.scale(sc, sc);
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.roundRect(-w / 2, -h / 2, w, h, 10); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath(); ctx.roundRect(-w / 2, h / 2 - 6, w, 6, [0, 0, 10, 10]); ctx.fill();
    text(label, 0, -1, Math.min(26, h * 0.4), '#fff', 'center', true);
    ctx.restore();
}

function drawWorker(x, y, idx, sz, selected, bounce, emotion) {
    const w = CREW[idx], s = sz || 1;
    const bob = bounce ? Math.sin(t * 4 + idx) * 4 * s : 0;
    const yy = y + bob;
    if (selected) {
        ctx.fillStyle = 'rgba(255,255,100,0.35)';
        ctx.beginPath(); ctx.arc(x, yy + 5 * s, 28 * s, 0, Math.PI * 2); ctx.fill();
    }
    rect(x - 10 * s, yy - 6 * s, 20 * s, 26 * s, w.color); // body
    rect(x - 8 * s, yy + 20 * s, 6 * s, 12 * s, '#5D4037'); // legs
    rect(x + 2 * s, yy + 20 * s, 6 * s, 12 * s, '#5D4037');
    // arms
    const wave = selected ? Math.sin(t * 8) * 20 : 0;
    ctx.save(); ctx.translate(x - 11 * s, yy); ctx.rotate((-25 + wave) * Math.PI / 180);
    rect(-3 * s, 0, 5 * s, 16 * s, '#FFCC80'); ctx.restore();
    ctx.save(); ctx.translate(x + 11 * s, yy); ctx.rotate((25 - wave) * Math.PI / 180);
    rect(-2 * s, 0, 5 * s, 16 * s, '#FFCC80'); ctx.restore();
    rect(x - 11 * s, yy - 26 * s, 22 * s, 22 * s, '#FFCC80'); // head
    rect(x - 13 * s, yy - 31 * s, 26 * s, 9 * s, w.hat); // hat top
    rect(x - 16 * s, yy - 23 * s, 32 * s, 4 * s, w.hat); // hat brim
    const ey = yy - 19 * s;
    if (emotion === 'happy') {
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2 * s;
        ctx.beginPath(); ctx.arc(x - 5 * s, ey, 2.5 * s, Math.PI, 0); ctx.stroke();
        ctx.beginPath(); ctx.arc(x + 5 * s, ey, 2.5 * s, Math.PI, 0); ctx.stroke();
        ctx.beginPath(); ctx.arc(x, yy - 12 * s, 4 * s, 0.1 * Math.PI, 0.9 * Math.PI); ctx.stroke();
    } else if (emotion === 'nervous') {
        rect(x - 6 * s, ey - 1 * s, 4 * s, 5 * s, '#000');
        rect(x + 3 * s, ey - 1 * s, 4 * s, 5 * s, '#000');
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2 * s;
        ctx.beginPath(); ctx.arc(x, yy - 10 * s, 4 * s, 0.1 * Math.PI, 0.9 * Math.PI, true); ctx.stroke();
    } else {
        rect(x - 6 * s, ey, 4 * s, 4 * s, '#000');
        rect(x + 3 * s, ey, 4 * s, 4 * s, '#000');
        rect(x - 3 * s, yy - 11 * s, 6 * s, 2 * s, '#000');
    }
}

function drawTree(x, y, tr, fall, shaveProg) {
    ctx.save();
    ctx.translate(x, y);
    if (fall) ctx.rotate(fall * Math.PI / 180);
    if (tr.lean) ctx.translate(tr.lean, 0);
    rect(-tr.tw / 2, -tr.th, tr.tw, tr.th, tr.tc);
    if (shaveProg > 0) {
        for (let i = 0; i < Math.floor(shaveProg * 5); i++)
            rect(-tr.tw / 2 - 2, -tr.th + 20 + i * 18, tr.tw + 4, 3, '#D7CCC8');
    }
    if (tr.type === 'palm') {
        for (let i = 0; i < 7; i++) {
            ctx.save(); ctx.translate(0, -tr.th);
            ctx.rotate((i * 51 + Math.sin(t * 2 + i) * 5) * Math.PI / 180);
            rect(-4, 0, 8, -tr.cr, tr.col); rect(-12, -tr.cr, 24, 8, tr.col);
            ctx.restore();
        }
    } else if (tr.type === 'pine') {
        for (let i = 0; i < 3; i++) {
            const ly = -tr.th + 10 - i * (tr.cr * 0.6), lw = tr.cr * (1.3 - i * 0.3);
            ctx.fillStyle = i % 2 === 0 ? tr.col : lighten(tr.col);
            ctx.beginPath(); ctx.moveTo(0, ly - tr.cr * 0.5);
            ctx.lineTo(-lw / 2, ly + 8); ctx.lineTo(lw / 2, ly + 8); ctx.closePath(); ctx.fill();
        }
    } else if (tr.type === 'dead') {
        ctx.strokeStyle = tr.tc; ctx.lineWidth = 4;
        for (let i = 0; i < 4; i++) {
            const by = -tr.th + 15 + i * 25, dir = i % 2 === 0 ? 1 : -1;
            ctx.beginPath(); ctx.moveTo(0, by); ctx.lineTo(dir * (25 + i * 8), by - 20 - i * 5); ctx.stroke();
        }
    } else {
        const cx = 0, cy = -tr.th - tr.cr * 0.3, bs = 12;
        for (let bx = -tr.cr; bx < tr.cr; bx += bs) {
            for (let by = -tr.cr; by < tr.cr; by += bs) {
                if (Math.sqrt(bx * bx + by * by) < tr.cr) {
                    ctx.fillStyle = (Math.floor(bx / bs) + Math.floor(by / bs)) % 3 === 0 ? lighten(tr.col) : tr.col;
                    ctx.fillRect(cx + bx, cy + by, bs - 1, bs - 1);
                }
            }
        }
    }
    ctx.restore();
}

function drawVehicle(x, y, idx) {
    const colors = ['#D32F2F', '#1976D2', '#00897B', '#689F38', '#FF8F00'];
    const c = colors[idx] || '#666';
    ctx.save(); ctx.translate(x, y);
    rect(-35, -25, 70, 20, c); rect(-35, -40, 25, 18, c); rect(-32, -38, 10, 10, '#B3E5FC');
    rect(-28, -5, 14, 14, '#333'); rect(14, -5, 14, 14, '#333');
    rect(-26, -3, 10, 10, '#666'); rect(16, -3, 10, 10, '#666');
    if (idx === 4) { for (let i = 0; i < 3; i++) { rect(i * 12, -35, 8, 12, '#FF6D00'); } }
    ctx.restore();
}

function drawSky() {
    const gr = ctx.createLinearGradient(0, 0, 0, H * 0.65);
    gr.addColorStop(0, '#4FC3F7'); gr.addColorStop(1, '#81D4FA');
    ctx.fillStyle = gr; ctx.fillRect(0, 0, W, H * 0.65);
    for (let cx of [120, 350, 600, 850]) {
        const cy = 50 + Math.sin(t * 0.2 + cx) * 8;
        rect(cx, cy, 60, 20, 'rgba(255,255,255,0.7)');
        rect(cx + 10, cy - 12, 40, 16, 'rgba(255,255,255,0.7)');
        rect(cx + 20, cy - 20, 20, 12, 'rgba(255,255,255,0.6)');
    }
}
function drawGround() {
    rect(0, H * 0.65, W, H * 0.1, '#4CAF50');
    rect(0, H * 0.75, W, H * 0.05, '#795548');
    rect(0, H * 0.8, W, H * 0.08, '#424242');
    rect(0, H * 0.835, W, 4, '#FFD600');
    rect(0, H * 0.88, W, H * 0.12, '#388E3C');
    for (let i = 0; i < 30; i++) {
        ctx.fillStyle = i % 3 === 0 ? '#66BB6A' : '#43A047';
        ctx.fillRect(i * 35, H * 0.65, 6, 4 + (i % 4));
    }
}
function drawScene() { drawSky(); drawGround(); }

function spawnP(x, y, c, n, sp) {
    for (let i = 0; i < n; i++)
        particles.push({ x, y, vx: rand(-sp, sp), vy: rand(-sp * 1.5, -1), sz: rand(3, 7), c, life: rand(20, 50), max: 50 });
}
function drawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.globalAlpha = p.life / p.max; ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.sz, p.sz); ctx.globalAlpha = 1;
    }
}
function drawFloats() {
    for (let i = floats.length - 1; i >= 0; i--) {
        const f = floats[i]; f.y -= 1; f.life--;
        if (f.life <= 0) { floats.splice(i, 1); continue; }
        ctx.globalAlpha = f.life / f.max;
        text(f.t, f.x, f.y, f.sz || 24, f.c || '#FFD700', 'center', true);
        ctx.globalAlpha = 1;
    }
}
function drawTaps() {
    for (let i = taps.length - 1; i >= 0; i--) {
        const f = taps[i]; f.life--;
        if (f.life <= 0) { taps.splice(i, 1); continue; }
        const r = (12 - f.life) * 2.5;
        ctx.strokeStyle = `rgba(255,255,255,${f.life / 12})`; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, Math.PI * 2); ctx.stroke();
    }
}
function drawSpeech() {
    if (!speech || speechLife <= 0) return;
    const { x, y, t: txt } = speech;
    ctx.globalAlpha = Math.min(1, speechLife / 10);
    ctx.font = 'bold 14px sans-serif';
    const bw = Math.min(260, ctx.measureText(txt).width + 30), bh = 38;
    const bx = clamp(x - bw / 2, 5, W - bw - 5), by = y - bh - 12;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 8); ctx.fill();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.moveTo(x - 6, by + bh); ctx.lineTo(x, by + bh + 10); ctx.lineTo(x + 6, by + bh); ctx.closePath(); ctx.fill(); ctx.stroke();
    text(txt, bx + bw / 2, by + bh / 2, 13, '#333', 'center', false);
    ctx.globalAlpha = 1;
}

function showSpeech(x, y, txt, dur) { speech = { x, y, t: txt }; speechLife = dur || 120; }

// ─── PULSING ARROW (key for guiding the kid) ─────────────────
function drawArrow(x, y, dir, color) {
    const bob = Math.sin(t * 5) * 8;
    ctx.fillStyle = color || '#FFD700';
    ctx.save();
    ctx.translate(x, y + bob);
    if (dir === 'down') {
        ctx.beginPath(); ctx.moveTo(-12, -10); ctx.lineTo(12, -10); ctx.lineTo(0, 10); ctx.closePath(); ctx.fill();
    } else if (dir === 'up') {
        ctx.beginPath(); ctx.moveTo(-12, 10); ctx.lineTo(12, 10); ctx.lineTo(0, -10); ctx.closePath(); ctx.fill();
    } else if (dir === 'right') {
        ctx.beginPath(); ctx.moveTo(-10, -12); ctx.lineTo(-10, 12); ctx.lineTo(10, 0); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
}

// ─── GENERATE JOB ─────────────────────────────────────────────
function newJob() {
    const maxD = Math.min(3, Math.ceil(crewLevel / 2) + 1);
    const tmpl = pick(JOBS.filter(j => j.d <= maxD));
    const tree = pick(TREES);
    return {
        tree: { ...tree },
        tasks: tmpl.tasks.map(id => ({ ...TASKS[id], id })),
        pay: tmpl.d * 50 + tmpl.tasks.length * 25,
        difficulty: tmpl.d,
    };
}

// ─── MATCH LOGIC ──────────────────────────────────────────────
function matchLevel(wi, task) {
    const w = CREW[wi];
    if (w.best === 'wild') return 'ok';
    if (w.best === task.skill) return 'great';
    if (w.weak === task.skill) return 'bad';
    return 'ok';
}

// ═══════════════════════════════════════════════════════════════
// MINI-GAME LOGIC
// ═══════════════════════════════════════════════════════════════

function setupMiniGame(taskId, ml) {
    mgTaskId = taskId;
    mgTargets = [];
    mgScore = 0;
    mgMisses = 0;
    mgTimer = MG_DURATION;
    mgSpawnTimer = 0;
    // Difficulty: great = easier (0.7), ok = normal (1.0), bad = harder (1.25)
    mgDiff = ml === 'great' ? 0.7 : ml === 'bad' ? 1.25 : 1.0;
    mgInstrText = MG_INSTRUCTIONS[taskId] || 'TAP!';

    if (taskId === 'chop') {
        mgNeeded = 8; mgTotal = 8;
        spawnChopTarget();
    } else if (taskId === 'drive') {
        mgNeeded = 4; mgTotal = 4; // need to dodge 4 obstacles (mgScore counts dodges)
        mgLane = 1; mgScore = 0; mgMisses = 0;
    } else if (taskId === 'shave') {
        mgNeeded = 6; mgTotal = 6;
        // Spawn first batch of branches
        for (let i = 0; i < 3; i++) spawnShaveTarget(i * 40);
    } else if (taskId === 'cones') {
        mgNeeded = 5; mgTotal = 5;
        mgSpawnTimer = 30; // first cone zone appears quickly
    } else if (taskId === 'bucket') {
        mgNeeded = 5; mgTotal = 7;
        mgLane = 2; // bucket position (0-4, 5 columns)
    } else if (taskId === 'chip') {
        mgNeeded = 6; mgTotal = 8;
        // Spawn first batch
        for (let i = 0; i < 3; i++) spawnChipTarget();
    }
}

function spawnChopTarget() {
    const baseSize = 40;
    const sz = baseSize * (mgDiff === 0.7 ? 1.3 : mgDiff === 1.25 ? 0.75 : 1.0);
    // Target on the tree trunk area
    const treeX = 650, treeY = H * 0.65;
    const ox = rand(-30, 30) * mgDiff;
    const oy = rand(-100, -20);
    mgTargets.push({ x: treeX + ox, y: treeY + oy, sz, life: 120, maxLife: 120, type: 'chop' });
}

function spawnShaveTarget(delay) {
    const treeX = 650, treeY = H * 0.65;
    const side = Math.random() < 0.5 ? -1 : 1;
    const y = treeY + rand(-120, -20);
    const lifeBase = mgDiff === 0.7 ? 150 : mgDiff === 1.25 ? 70 : 100;
    mgTargets.push({ x: treeX + side * (job.tree.tw / 2 + rand(15, 45)), y, w: 50, h: 16, life: lifeBase + (delay || 0), maxLife: lifeBase, type: 'shave', side, spawned: false, delay: delay || 0 });
}

function spawnChipTarget() {
    const treeX = 650, treeY = H * 0.65;
    const x = treeX + rand(-200, 150);
    const y = treeY + rand(-80, 30);
    const lifeBase = mgDiff === 0.7 ? 150 : mgDiff === 1.25 ? 70 : 100;
    mgTargets.push({ x, y, sz: 30, life: lifeBase, maxLife: lifeBase, type: 'chip' });
}

function updateMiniGame() {
    mgTimer--;

    if (mgTaskId === 'chop') {
        // Targets just pulse and wait to be tapped; they don't expire quickly
        for (let i = mgTargets.length - 1; i >= 0; i--) {
            mgTargets[i].life--;
            if (mgTargets[i].life <= 0) {
                mgTargets.splice(i, 1);
                // Respawn if player hasn't hit enough yet and time remains
                if (mgScore < mgNeeded && mgTimer > 30) spawnChopTarget();
            }
        }
        if (mgTargets.length === 0 && mgScore < mgNeeded && mgTimer > 30) spawnChopTarget();
    } else if (mgTaskId === 'drive') {
        mgSpawnTimer--;
        // Spawn obstacles at intervals
        if (mgSpawnTimer <= 0 && mgTargets.filter(t => t.type === 'obs').length < 2) {
            const totalSpawned = mgTargets.filter(t => t.counted).length + mgTargets.filter(t => !t.counted && t.type === 'obs').length;
            if (totalSpawned < mgTotal) {
                const lane = Math.floor(Math.random() * 3);
                const speed = (2.5 + mgDiff * 1.5);
                mgTargets.push({ x: W + 40, lane, speed, type: 'obs', counted: false, w: 40, h: 40 });
                mgSpawnTimer = Math.floor(60 + rand(0, 30));
            }
        }
        // Move obstacles
        for (let i = mgTargets.length - 1; i >= 0; i--) {
            const ob = mgTargets[i];
            if (ob.type !== 'obs') continue;
            ob.x -= ob.speed;
            // Check collision with player truck
            const truckX = 200;
            const laneYs = [H * 0.72, H * 0.79, H * 0.86];
            const truckY = laneYs[mgLane];
            const obY = laneYs[ob.lane];
            if (ob.x < truckX + 30 && ob.x + ob.w > truckX - 30 && ob.lane === mgLane && !ob.counted) {
                ob.counted = true;
                mgMisses++;
                shake = 6;
                spawnP(truckX, truckY, '#FF5722', 8, 3);
                floats.push({ t: 'HIT!', x: truckX, y: truckY - 30, life: 30, max: 30, c: '#FF5722', sz: 22 });
                playSound('fail');
            }
            // Passed safely
            if (ob.x < truckX - 50 && !ob.counted) {
                ob.counted = true;
                mgScore++;
                floats.push({ t: '+1', x: truckX, y: truckY - 30, life: 30, max: 30, c: '#4CAF50', sz: 20 });
                playSound('coin');
            }
            if (ob.x < -60) mgTargets.splice(i, 1);
        }
        // Check if all obstacles are done
        const totalCounted = mgTargets.filter(t => t.counted).length + mgScore + mgMisses;
        // End early if all obstacles passed
    } else if (mgTaskId === 'shave') {
        for (let i = mgTargets.length - 1; i >= 0; i--) {
            const br = mgTargets[i];
            if (br.delay > 0) { br.delay--; continue; }
            br.life--;
            if (br.life <= 0) {
                mgTargets.splice(i, 1);
                // Spawn replacement if needed
                if (mgScore < mgNeeded && mgTimer > 40) spawnShaveTarget(0);
            }
        }
    } else if (mgTaskId === 'cones') {
        mgSpawnTimer--;
        if (mgSpawnTimer <= 0 && mgTargets.length === 0 && mgScore < mgTotal) {
            // Spawn a cone zone
            const zoneX = 350 + mgScore * 60;
            const lifeBase = mgDiff === 0.7 ? 120 : mgDiff === 1.25 ? 50 : 75;
            mgTargets.push({ x: zoneX, y: H * 0.62, w: 50, h: 30, life: lifeBase, maxLife: lifeBase, type: 'cone', idx: mgScore });
        }
        for (let i = mgTargets.length - 1; i >= 0; i--) {
            mgTargets[i].life--;
            if (mgTargets[i].life <= 0) {
                mgTargets.splice(i, 1);
                mgSpawnTimer = 20;
            }
        }
    } else if (mgTaskId === 'bucket') {
        mgSpawnTimer--;
        if (mgSpawnTimer <= 0) {
            const spawned = mgTargets.filter(t => t.type === 'branch').length + mgScore + mgMisses;
            if (spawned < mgTotal) {
                const col = Math.floor(Math.random() * 5);
                const speed = mgDiff === 0.7 ? 1.8 : mgDiff === 1.25 ? 3.5 : 2.5;
                mgTargets.push({ x: 450 + col * 60, y: H * 0.2, col, speed, type: 'branch', w: 30, h: 15 });
                mgSpawnTimer = Math.floor(35 + rand(0, 15));
            }
        }
        for (let i = mgTargets.length - 1; i >= 0; i--) {
            const br = mgTargets[i];
            if (br.type !== 'branch') continue;
            br.y += br.speed;
            // Catch check
            const bucketX = 450 + mgLane * 60;
            const bucketY = H * 0.58;
            if (br.y >= bucketY - 10 && br.y <= bucketY + 20) {
                if (Math.abs(br.x - bucketX) < 40) {
                    mgScore++;
                    spawnP(bucketX, bucketY, '#4CAF50', 5, 2);
                    floats.push({ t: '+1', x: bucketX, y: bucketY - 20, life: 30, max: 30, c: '#4CAF50', sz: 20 });
                    playSound('coin');
                    mgTargets.splice(i, 1);
                    continue;
                }
            }
            // Missed (fell past)
            if (br.y > H * 0.65) {
                mgMisses++;
                floats.push({ t: 'MISS', x: br.x, y: H * 0.6, life: 25, max: 25, c: '#FF5722', sz: 16 });
                mgTargets.splice(i, 1);
            }
        }
    } else if (mgTaskId === 'chip') {
        for (let i = mgTargets.length - 1; i >= 0; i--) {
            mgTargets[i].life--;
            if (mgTargets[i].life <= 0) {
                mgTargets.splice(i, 1);
                mgMisses++;
                // Spawn more if needed
                if (mgScore + mgMisses < mgTotal && mgTimer > 30) spawnChipTarget();
            }
        }
        // Keep some targets available
        if (mgTargets.length === 0 && mgScore + mgMisses < mgTotal && mgTimer > 30) {
            spawnChipTarget();
        }
    }
}

function drawMiniGame() {
    const playAreaX = 300, playAreaY = H * 0.15;

    // Timer bar across top of play area
    const timerW = 400, timerH = 10;
    const timerX = W / 2 - timerW / 2, timerY = 55;
    rect(timerX, timerY, timerW, timerH, 'rgba(255,255,255,0.2)');
    const timerFrac = mgTimer / MG_DURATION;
    rect(timerX, timerY, timerW * timerFrac, timerH, timerFrac > 0.3 ? '#4CAF50' : '#FF5722');

    // Score counter top-right
    const taskIcons = { chop: '🪓', drive: '🚛', shave: '🪒', cones: '🔶', bucket: '🏗', chip: '🌿' };
    const icon = taskIcons[mgTaskId] || '';
    if (mgTaskId === 'drive') {
        text(`Dodged: ${mgScore}/${mgNeeded} ${icon}`, W - 100, 82, 18, '#fff', 'center', true);
    } else {
        text(`Hits: ${mgScore}/${mgNeeded} ${icon}`, W - 100, 82, 18, '#fff', 'center', true);
    }

    if (mgTaskId === 'chop') {
        for (const tg of mgTargets) {
            const pulse = 1 + Math.sin(t * 8) * 0.15;
            const r = tg.sz / 2 * pulse;
            const alpha = Math.min(1, tg.life / 20);
            ctx.globalAlpha = alpha;
            // Bullseye
            ctx.fillStyle = '#FF5722'; ctx.beginPath(); ctx.arc(tg.x, tg.y, r, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(tg.x, tg.y, r * 0.65, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#FF5722'; ctx.beginPath(); ctx.arc(tg.x, tg.y, r * 0.3, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;
            // TAP prompt
            if (tg.life > 30) drawArrow(tg.x, tg.y - r - 20, 'down', '#FFD700');
        }
    } else if (mgTaskId === 'drive') {
        const laneYs = [H * 0.72, H * 0.79, H * 0.86];
        const truckX = 200;
        // Draw lane indicators
        for (let i = 0; i < 3; i++) {
            ctx.strokeStyle = i === mgLane ? 'rgba(255,255,0,0.4)' : 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 8]);
            ctx.beginPath(); ctx.moveTo(100, laneYs[i]); ctx.lineTo(W - 50, laneYs[i]); ctx.stroke();
            ctx.setLineDash([]);
        }
        // Draw truck
        drawVehicle(truckX, laneYs[mgLane], 0);
        // Draw obstacles
        for (const ob of mgTargets) {
            if (ob.type !== 'obs') continue;
            const oy = laneYs[ob.lane];
            // Rock/pothole
            ctx.fillStyle = '#795548';
            ctx.beginPath(); ctx.arc(ob.x, oy, 18, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#5D4037';
            ctx.beginPath(); ctx.arc(ob.x, oy - 3, 12, 0, Math.PI * 2); ctx.fill();
            text('🪨', ob.x, oy - 2, 20, '#fff', 'center', false);
        }
        // Tap zones hint
        if (mgTimer > 240) {
            text('⬆ TAP TOP', W / 2, H * 0.69, 14, 'rgba(255,255,255,0.5)', 'center', false);
            text('⬇ TAP BOTTOM', W / 2, H * 0.91, 14, 'rgba(255,255,255,0.5)', 'center', false);
        }
    } else if (mgTaskId === 'shave') {
        for (const br of mgTargets) {
            if (br.delay > 0) continue;
            const alpha = Math.min(1, br.life / 20);
            ctx.globalAlpha = alpha;
            // Branch sticking out
            ctx.fillStyle = '#8D6E63';
            ctx.fillRect(br.x - br.w / 2, br.y - br.h / 2, br.w, br.h);
            // Leaves on branch
            ctx.fillStyle = '#4CAF50';
            const lx = br.side > 0 ? br.x + br.w / 2 - 10 : br.x - br.w / 2 - 5;
            ctx.beginPath(); ctx.arc(lx, br.y, 10, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;
            if (br.life > 20) drawArrow(br.x, br.y - 25, 'down', '#FFD700');
        }
    } else if (mgTaskId === 'cones') {
        // Draw already-placed cones
        for (let i = 0; i < mgScore; i++) {
            const cx = 350 + i * 60;
            rect(cx - 8, H * 0.62, 16, 20, '#FF6D00');
            text('🔶', cx, H * 0.60, 16, '#fff', 'center', false);
        }
        // Draw active zone
        for (const z of mgTargets) {
            const pulse = Math.sin(t * 10) * 0.3 + 0.7;
            ctx.globalAlpha = pulse * Math.min(1, z.life / 15);
            ctx.fillStyle = '#FFD700';
            ctx.strokeStyle = '#FF6D00'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.roundRect(z.x - z.w / 2, z.y - z.h / 2, z.w, z.h, 6); ctx.fill(); ctx.stroke();
            ctx.globalAlpha = 1;
            text('TAP!', z.x, z.y, 14, '#000', 'center', true);
            drawArrow(z.x, z.y - z.h / 2 - 22, 'down', '#FF6D00');
        }
    } else if (mgTaskId === 'bucket') {
        const cols = 5;
        const startX = 450;
        const spacing = 60;
        const bucketX = startX + mgLane * spacing;
        const bucketY = H * 0.58;
        // Draw column guides
        for (let i = 0; i < cols; i++) {
            ctx.strokeStyle = i === mgLane ? 'rgba(255,255,0,0.3)' : 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(startX + i * spacing, H * 0.2); ctx.lineTo(startX + i * spacing, H * 0.6); ctx.stroke();
            ctx.setLineDash([]);
        }
        // Draw bucket
        ctx.fillStyle = '#FFD600';
        ctx.beginPath();
        ctx.moveTo(bucketX - 25, bucketY); ctx.lineTo(bucketX - 18, bucketY + 20);
        ctx.lineTo(bucketX + 18, bucketY + 20); ctx.lineTo(bucketX + 25, bucketY);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = '#F9A825'; ctx.lineWidth = 2; ctx.stroke();
        // Draw falling branches
        for (const br of mgTargets) {
            if (br.type !== 'branch') continue;
            ctx.fillStyle = '#8D6E63';
            ctx.fillRect(br.x - 15, br.y - 5, 30, 10);
            ctx.fillStyle = '#4CAF50';
            ctx.beginPath(); ctx.arc(br.x + 10, br.y - 5, 7, 0, Math.PI * 2); ctx.fill();
        }
        // Tap zone hints
        if (mgTimer > 240) {
            text('⬅ TAP LEFT', startX - 30, bucketY + 10, 13, 'rgba(255,255,255,0.5)', 'center', false);
            text('TAP RIGHT ➡', startX + (cols - 1) * spacing + 40, bucketY + 10, 13, 'rgba(255,255,255,0.5)', 'center', false);
        }
    } else if (mgTaskId === 'chip') {
        // Draw chipper in center
        const chipperX = 550, chipperY = H * 0.55;
        rect(chipperX - 25, chipperY - 20, 50, 40, '#FF8F00');
        rect(chipperX - 30, chipperY - 25, 15, 10, '#E65100');
        text('⚙', chipperX, chipperY, 22, '#fff', 'center', false);
        // Draw wood pieces
        for (const wp of mgTargets) {
            const alpha = Math.min(1, wp.life / 20);
            ctx.globalAlpha = alpha;
            const pulse = 1 + Math.sin(t * 6 + wp.x) * 0.1;
            ctx.fillStyle = '#8D6E63';
            ctx.save(); ctx.translate(wp.x, wp.y); ctx.scale(pulse, pulse);
            ctx.fillRect(-wp.sz / 2, -wp.sz / 2, wp.sz, wp.sz * 0.6);
            ctx.fillStyle = '#6D4C41';
            ctx.fillRect(-wp.sz / 2, -wp.sz / 2 + wp.sz * 0.6, wp.sz, wp.sz * 0.2);
            ctx.restore();
            ctx.globalAlpha = 1;
            if (wp.life > 25) drawArrow(wp.x, wp.y - wp.sz / 2 - 22, 'down', '#FFD700');
        }
    }
}

function tapMiniGame(gx, gy) {
    if (mgTaskId === 'chop') {
        for (let i = mgTargets.length - 1; i >= 0; i--) {
            const tg = mgTargets[i];
            const dx = gx - tg.x, dy = gy - tg.y;
            if (Math.sqrt(dx * dx + dy * dy) < tg.sz / 2 + 15) { // generous hit area
                mgScore++;
                spawnP(tg.x, tg.y, '#8D6E63', 6, 3);
                floats.push({ t: '+1', x: tg.x, y: tg.y - 20, life: 25, max: 25, c: '#4CAF50', sz: 22 });
                playSound('chop');
                shake = 3;
                mgTargets.splice(i, 1);
                if (mgScore < mgNeeded) spawnChopTarget();
                return;
            }
        }
        // Miss
        floats.push({ t: 'miss', x: gx, y: gy, life: 20, max: 20, c: '#FF5722', sz: 14 });
    } else if (mgTaskId === 'drive') {
        // Tap top half = move up, bottom half = move down
        const midY = H * 0.79;
        if (gy < midY && mgLane > 0) { mgLane--; playSound('tap'); }
        else if (gy >= midY && mgLane < 2) { mgLane++; playSound('tap'); }
    } else if (mgTaskId === 'shave') {
        for (let i = mgTargets.length - 1; i >= 0; i--) {
            const br = mgTargets[i];
            if (br.delay > 0) continue;
            if (hit(gx, gy, br.x - br.w / 2 - 10, br.y - br.h / 2 - 10, br.w + 20, br.h + 20)) {
                mgScore++;
                spawnP(br.x, br.y, '#D7CCC8', 5, 2);
                floats.push({ t: '+1', x: br.x, y: br.y - 20, life: 25, max: 25, c: '#4CAF50', sz: 20 });
                playSound('chop');
                mgTargets.splice(i, 1);
                if (mgScore < mgNeeded && mgTimer > 40) spawnShaveTarget(10);
                return;
            }
        }
        floats.push({ t: 'miss', x: gx, y: gy, life: 20, max: 20, c: '#FF5722', sz: 14 });
    } else if (mgTaskId === 'cones') {
        for (let i = mgTargets.length - 1; i >= 0; i--) {
            const z = mgTargets[i];
            if (hit(gx, gy, z.x - z.w / 2 - 10, z.y - z.h / 2 - 10, z.w + 20, z.h + 20)) {
                mgScore++;
                spawnP(z.x, z.y, '#FF6D00', 6, 2);
                floats.push({ t: '🔶 +1', x: z.x, y: z.y - 20, life: 25, max: 25, c: '#FF6D00', sz: 20 });
                playSound('coin');
                mgTargets.splice(i, 1);
                mgSpawnTimer = 25;
                return;
            }
        }
    } else if (mgTaskId === 'bucket') {
        // Tap left/right side of screen to move bucket
        const bucketCenterX = 450 + mgLane * 60;
        if (gx < bucketCenterX && mgLane > 0) { mgLane--; playSound('tap'); }
        else if (gx >= bucketCenterX && mgLane < 4) { mgLane++; playSound('tap'); }
    } else if (mgTaskId === 'chip') {
        for (let i = mgTargets.length - 1; i >= 0; i--) {
            const wp = mgTargets[i];
            if (hit(gx, gy, wp.x - wp.sz / 2 - 10, wp.y - wp.sz / 2 - 10, wp.sz + 20, wp.sz + 20)) {
                mgScore++;
                spawnP(wp.x, wp.y, '#4CAF50', 5, 3);
                spawnP(wp.x, wp.y, '#8D6E63', 3, 2);
                floats.push({ t: '+1', x: wp.x, y: wp.y - 20, life: 25, max: 25, c: '#4CAF50', sz: 20 });
                playSound('chipper');
                mgTargets.splice(i, 1);
                if (mgScore + mgMisses < mgTotal && mgTimer > 30) spawnChipTarget();
                return;
            }
        }
        floats.push({ t: 'miss', x: gx, y: gy, life: 20, max: 20, c: '#FF5722', sz: 14 });
    }
}

// ═══════════════════════════════════════════════════════════════
// SCREEN: RUNNING
// ═══════════════════════════════════════════════════════════════
function startRun() {
    state = 'RUNNING';
    runIdx = 0; runFrame = 0; runState = 'enter';
    runTimer = 180 * 60; // 3 minutes at 60fps
    phaseResults = []; runTreeFall = 0; runShave = 0;
    particles = []; floats = []; shake = 0; runCones = [];
    setupRun();
}

function setupRun() {
    runFrame = 0; runState = 'enter'; runWorkerX = -50; runVehicleX = -80;
    runBucketY = 0; runCones = [];
    const task = job.tasks[runIdx];
    const wi = assignments[runIdx];
    const ml = matchLevel(wi, task);
    setupMiniGame(task.id, ml);
    runSuccess = false; // determined by mini-game performance
}

function drawRunning() {
    if (shake > 0) {
        ctx.save(); ctx.translate(rand(-shake, shake), rand(-shake, shake));
        shake *= 0.9; if (shake < 0.5) shake = 0;
    }
    drawScene();
    const treeX = 650, treeY = H * 0.65;
    drawTree(treeX, treeY, job.tree, runTreeFall, runShave);
    const task = job.tasks[runIdx];
    const wi = assignments[runIdx];

    // Vehicle for drive/cones
    if (task.id === 'drive' || task.id === 'cones') {
        drawVehicle(runVehicleX, H * 0.82, task.id === 'cones' ? 4 : 0);
    }

    // Worker
    const emo = runState === 'result' ? (runSuccess ? 'happy' : 'nervous') :
                matchLevel(wi, task) === 'great' ? 'happy' : matchLevel(wi, task) === 'bad' ? 'nervous' : null;
    drawWorker(runWorkerX, H * 0.6, wi, 1.4, false, runState === 'enter', emo);

    // Work visuals — mini-game draws its own targets
    if (runState === 'work') {
        drawMiniGame();
        // Ambient particles for atmosphere
        if (task.id === 'chop' && runFrame % 30 < 10) spawnP(treeX - 20, treeY - 60, '#8D6E63', 1, 1);
        if (task.id === 'bucket') {
            ctx.strokeStyle = '#FFD600'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(runWorkerX + 30, H * 0.6); ctx.lineTo(runWorkerX + 30, H * 0.6 - runBucketY); ctx.stroke();
            rect(runWorkerX + 15, H * 0.6 - runBucketY - 15, 30, 15, '#FFD600');
        }
    }
    // Persistent cones
    for (const cx of runCones) rect(cx - 5, H * 0.62, 10, 15, '#FF6D00');

    // Instruction overlay
    if (runState === 'instruct') {
        const alpha = runFrame < 15 ? runFrame / 15 : runFrame > 70 ? (90 - runFrame) / 20 : 1;
        ctx.globalAlpha = Math.max(0, alpha);
        rect(W / 2 - 250, H / 2 - 60, 500, 120, 'rgba(0,0,0,0.75)');
        ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.roundRect(W / 2 - 250, H / 2 - 60, 500, 120, 12); ctx.stroke();
        text(mgInstrText, W / 2, H / 2 - 15, 30, '#FFD700', 'center', true);
        text('Get ready...', W / 2, H / 2 + 30, 18, '#fff', 'center', false);
        ctx.globalAlpha = 1;
    }

    // TIMBER!
    if (task.id === 'chop' && runState === 'result' && runSuccess && runFrame > 40) {
        const sc = Math.min(1, (runFrame - 40) / 15);
        ctx.save(); ctx.translate(W / 2, H * 0.3); ctx.scale(sc * 2.5, sc * 2.5);
        ctx.rotate(Math.sin(t * 10) * 0.05);
        text('TIMBER!!!', 0, 0, 44, '#FF5722', 'center', true);
        ctx.restore();
    }

    // Result icon
    if (runState === 'result') {
        text(runSuccess ? '✅' : '❌', runWorkerX + 30, H * 0.6 - 55, 44, '#fff', 'center', false);
    }

    drawParticles(); drawFloats(); drawSpeech();

    // HUD - current task label
    rect(0, 0, W, 50, 'rgba(0,0,0,0.6)');
    text(`${task.icon} ${task.name}  —  ${CREW[wi].name}`, W / 2, 25, 22, '#fff', 'center', true);

    // Task progress dots
    for (let i = 0; i < job.tasks.length; i++) {
        const dx = W - 30 - (job.tasks.length - i) * 35;
        const done = i < runIdx;
        const cur = i === runIdx;
        rect(dx, 55, 28, 28, cur ? 'rgba(255,255,0,0.3)' : 'rgba(0,0,0,0.3)');
        text(job.tasks[i].icon, dx + 14, 69, 16, '#fff', 'center', false);
        if (done) text(phaseResults[i] ? '✅' : '❌', dx + 22, 58, 10, '#fff', 'center', false);
    }

    if (shake > 0) ctx.restore();
}

function updateRunning() {
    runFrame++; speechLife--;
    const task = job.tasks[runIdx];

    if (runState === 'enter') {
        runWorkerX = lerp(runWorkerX, 380, 0.06);
        if (task.id === 'drive' || task.id === 'cones') runVehicleX = lerp(runVehicleX, 500, 0.05);
        if (runFrame > 50) {
            runState = 'instruct'; runFrame = 0;
            const w = CREW[assignments[runIdx]];
            const ml = matchLevel(assignments[runIdx], task);
            showSpeech(runWorkerX, H * 0.6 - 70, ml === 'great' ? w.good : ml === 'bad' ? w.bad : w.idle, 80);
            if (assignments[runIdx] === 2) playSound('honk');
        }
    } else if (runState === 'instruct') {
        // Show instruction overlay for 1.5 seconds (90 frames)
        if (runFrame > 90) {
            runState = 'work'; runFrame = 0;
        }
    } else if (runState === 'work') {
        updateMiniGame();
        // Update visual effects based on score progress
        if (task.id === 'shave') runShave = Math.min(1, mgScore / Math.max(1, mgNeeded));
        if (task.id === 'cones') {
            runCones = [];
            for (let i = 0; i < mgScore; i++) runCones.push(350 + i * 60);
        }
        if (task.id === 'bucket') runBucketY = Math.sin(runFrame * 0.03) * 80 + 80;

        if (mgTimer <= 0) {
            // Mini-game over — evaluate result
            runSuccess = mgScore >= mgNeeded;
            runState = 'result'; runFrame = 0;
            phaseResults.push(runSuccess);
            if (runSuccess) {
                playSound('success'); spawnP(runWorkerX, H * 0.55, '#4CAF50', 15, 4);
                if (task.id === 'chop') { playSound('timber'); shake = 10; }
            } else {
                playSound('fail'); spawnP(runWorkerX, H * 0.55, '#FF5722', 10, 3);
            }
        }
    } else if (runState === 'result') {
        if (task.id === 'chop' && runSuccess) runTreeFall = Math.min(90, runTreeFall + 2);
        if (runFrame >= 100) {
            runIdx++;
            if (runIdx >= job.tasks.length) { finishJob(); }
            else { setupRun(); }
        }
    }
}

function finishJob() {
    state = 'RESULTS'; runFrame = 0;
    const ok = phaseResults.filter(r => r).length;
    const tot = phaseResults.length;
    const ratio = ok / tot;
    earnStars = ratio >= 1 ? 3 : ratio >= 0.5 ? 2 : 1;
    earnCoins = Math.floor(job.pay * ratio);
    if (ratio >= 1) earnCoins += 30; // perfect bonus
    coins += earnCoins;
    jobsDone++;
    if (jobsDone % 3 === 0 && crewLevel < 5) crewLevel++;
    save();
}

// ═══════════════════════════════════════════════════════════════
// SCREEN: RESULTS
// ═══════════════════════════════════════════════════════════════
function drawResults() {
    drawScene();
    rect(0, 0, W, H, 'rgba(0,0,0,0.6)');

    const by = 60 + Math.sin(t * 3) * 4;
    text('JOB COMPLETE!', W / 2, by, 44, '#FFD700', 'center', true);
    text(job.tree.name, W / 2, by + 42, 22, '#fff', 'center', true);

    // Results
    for (let i = 0; i < job.tasks.length; i++) {
        const ry = 140 + i * 50;
        const ok = phaseResults[i];
        rect(220, ry, W - 440, 42, ok ? 'rgba(76,175,80,0.2)' : 'rgba(244,67,54,0.2)');
        text(`${job.tasks[i].icon} ${job.tasks[i].name}`, 240, ry + 21, 18, '#fff', 'left', false);
        text(CREW[assignments[i]].name, 560, ry + 21, 15, CREW[assignments[i]].color, 'left', true);
        text(ok ? '✅' : '❌', 750, ry + 21, 22, '#fff', 'center', false);
    }

    const sy = 160 + job.tasks.length * 50;
    let stars = '';
    for (let i = 0; i < 3; i++) stars += i < earnStars ? '⭐' : '☆';
    text(stars, W / 2, sy, 40, '#fff', 'center', false);
    text(`+ $${earnCoins}`, W / 2, sy + 50, 36, '#4CAF50', 'center', true);

    // Summary
    const ok = phaseResults.filter(r => r).length;
    let sum = `${ok} out of ${phaseResults.length} tasks done!`;
    if (ok === phaseResults.length) sum = 'PERFECT JOB! Amazing boss!';
    text(sum, W / 2, sy + 95, 18, '#B0BEC5', 'center', false);

    if (jobsDone % 3 === 0) {
        text('CREW LEVELED UP! Level ' + crewLevel, W / 2, sy + 125, 22, '#FFD700', 'center', true);
        spawnP(W / 2, sy + 125, '#FFD700', 1, 3);
    }

    btn(W / 2 - 150, H - 100, 300, 65, 'NEXT JOB!', '#4CAF50', true);
    drawHUD(); drawParticles();

    if (runFrame < 25 && runFrame % 3 === 0) { spawnP(W / 2, H / 2, '#FFD700', 3, 5); playSound('coin'); }
    runFrame++;
}

function tapResults(gx, gy) {
    if (hit(gx, gy, W / 2 - 150, H - 100, 300, 65)) {
        playSound('tap');
        job = newJob();
        state = 'JOB_BOARD';
    }
}

// ─── INPUT ────────────────────────────────────────────────────
function handleTap(e) {
    e.preventDefault(); initAudio();
    const touch = e.changedTouches ? e.changedTouches[0] : e;
    const g = toGame(touch.clientX, touch.clientY);
    taps.push({ x: g.x, y: g.y, life: 12 });
    switch (state) {
        case 'MENU': tapMenu(g.x, g.y); break;
        case 'JOB_BOARD': tapJobBoard(g.x, g.y); break;
        case 'PLANNING': tapPlanning(g.x, g.y); break;
        case 'RUNNING': if (runState === 'work') tapMiniGame(g.x, g.y); break;
        case 'RESULTS': tapResults(g.x, g.y); break;
    }
}
canvas.addEventListener('touchstart', handleTap, { passive: false });
canvas.addEventListener('mousedown', handleTap);

// ─── GAME LOOP ────────────────────────────────────────────────
function loop() {
    t += 1 / 60;
    ctx.save(); ctx.scale(scale, scale);
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
    switch (state) {
        case 'MENU': drawMenu(); break;
        case 'JOB_BOARD': drawJobBoard(); break;
        case 'PLANNING': drawPlanning(); break;
        case 'RUNNING': updateRunning(); drawRunning(); break;
        case 'RESULTS': drawResults(); break;
    }
    drawTaps();
    ctx.restore();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
